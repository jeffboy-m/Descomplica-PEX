        {nome: 'Suco Copo', descricao: 'Caju, Cajá, Abacaxi, Maraculá e Morango', preco: 'R$ 6,99', imagem: 'imagens/coposuco.jpg'},
        {nome: 'Suco de Laranja', descricao: '', preco: 'R$ 9,99 - copo', preco1:'R$ 19,99 - Jarra', imagem: 'imagens/sucolaranja500.jpg'},
        {nome: 'Suco Jarra 1L', descricao: 'Caju, Cajá, Abacaxi, Maraculá e Morango', preco: 'R$ 14,99', imagem: 'imagens/Sucojarra.jpg'},
        {nome: 'Cerveja', descricao: 'Bama chop e duplo malte, Skol, Bud, Amtel, Heinken, Stella', preco: 'R$ 6,99 - 17,99', imagem: 'imagens/cerveja.jpg'},
        {nome: 'Cerveja Long', descricao: 'Bud, Heinken, Stella, Corona e Império', preco: 'R$ 6,99 - 9,99', imagem: 'imagens/cerveja.jpg'},
        {nome: 'Energético', descricao: 'Monster e Redbull', preco: 'R$ 11,99 - 14,99', imagem: 'imagens/energeticolata.jpg'},
        {nome: 'Energético 1L', descricao: '', preco: 'R$ 11,99', imagem: 'imagens/energetico1litro.jpg'},
        {nome: 'Energético 2L', descricao: '', preco: 'R$ 16,99', imagem: 'imagens/energetico2litro.jpg'},
        

      ]
    },
    {
      id: 'Drinks',
      nome: 'DRINKS',
      itens: [
        {nome: 'Caipirinha', descricao: '', preco: 'R$ 11,99', imagem: 'imagens/caipirinha.jpg'},
        {nome: 'Caipirosca', descricao: '', preco: 'R$ 14,99', imagem: 'imagens/caipirosca.jpg'},
        {nome: 'Caipifruta', descricao: '', preco: 'R$ 14,99', imagem: 'imagens/caipifruta.jpg'},
        {nome: 'Nevada', descricao: '', preco: 'R$ 14,99', imagem: 'imagens/nevada.jpg'},
        
        
      ]
    }
  ];

  const navCategories = document.querySelector('.categories-carousel');
  const mainContent = document.querySelector('main');

  // Criar botões das categorias no carrossel
  categorias.forEach((categoria, index) => {
    const btn = document.createElement('butto');//'button'
    btn.classList.add('category-btn');
    btn.textContent = categoria.nome;
    btn.setAttribute('data-id', categoria.id);
    btn.setAttribute('aria-controls', categoria.id);
    btn.setAttribute('type', 'button');
    if(index === 0) btn.classList.add('active');

    btn.addEventListener('click', () => {
      // Scroll para a seção da categoria
      document.getElementById(categoria.id).scrollIntoView({behavior: 'smooth', block: 'start'});
      setActiveCategory(categoria.id);
    });

    navCategories.appendChild(btn);
  });

  // Criar seções das categorias com itens do cardápio
  categorias.forEach(categoria => {
    const section = document.createElement('section');
    section.classList.add('category-section');
    section.id = categoria.id;

    const h2 = document.createElement('h2');
    h2.textContent = categoria.nome;
    section.appendChild(h2);

    const list = document.createElement('div');
    list.classList.add('item-list');

    categoria.itens.forEach(item => {
      const card = document.createElement('article');
      card.classList.add('item-card');

      const img = document.createElement('img');
      img.classList.add('item-image');
      img.src = item.imagem;
      img.alt = item.nome;

      const name = document.createElement('h3');
      name.classList.add('item-name');
      name.textContent = item.nome;
    

      const desc = document.createElement('p');
      desc.classList.add('item-description');
      desc.textContent = item.descricao;

      const price = document.createElement('p');
      price.classList.add('item-price');
      price.textContent = item.preco;

      const price1 = document.createElement('p');
      price1.classList.add('item-price1');
      price1.textContent = item.preco1;

      const price2 = document.createElement('p');
      price2.classList.add('item-price2');
      price2.textContent = item.preco2;

      card.appendChild(img);
      card.appendChild(name);
      
      card.appendChild(price);
      card.appendChild(price1);
      card.appendChild(price2);
      card.appendChild(desc);
      
      
      

      list.appendChild(card);
    });

    section.appendChild(list);
    mainContent.appendChild(section);
  });

  // Função para atualizar botão ativo do carrossel
  function setActiveCategory(id) {
    const buttons = document.querySelectorAll('.category-btn');
    buttons.forEach(btn => {
      if(btn.getAttribute('data-id') === id){
        btn.classList.add('active');
        // Garantir que o botão ativo fique visível no carrossel
        btn.scrollIntoView({behavior: 'smooth', inline: 'center', block: 'nearest'});
      } else {
        btn.classList.remove('active');
      }
    });
  }

  // Detecta a categoria atualmente visível na tela ao rolar a página
  function onScroll() {
    const scrollPosition = window.scrollY + window.innerHeight/5; // pegando um pouco acima do meio da viewport
    let currentId = categorias[0].id;

    for (const categoria of categorias) {
      const section = document.getElementById(categoria.id);
      if(section.offsetTop <= scrollPosition){
        currentId = categoria.id;
      }
    }
    setActiveCategory(currentId);
  }

  window.addEventListener('scroll', onScroll);
  window.addEventListener('resize', onScroll);

  // Ativa inicialmente a categoria correta
  onScroll();

</script>
</body>
</html>
